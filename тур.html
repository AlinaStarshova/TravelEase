        body.dark-theme .btn { background: #70a9ff; color: #0f1724; }
        .extras-group { margin: 20px 0; max-height: 320px; overflow-y: auto; padding-right: 8px; }
        .extras-group label { display: flex; align-items: center; gap: 14px; margin: 16px 0; cursor: pointer; }

        .extras-list { font-size: 13px; margin-top: 10px; color: #2b6e3c; }

<body>
<div class="app">
    <header>
        <div class="logo" onclick="location.reload()">✈ TravelEase</div>
        <div class="user-area" id="userArea">
            <button id="authButton" onclick="openAuthModal()" data-i18n="auth_btn">Вход / Регистрация</button>
        </div>
        <div class="nav">
            <button id="navHome" class="active" onclick="showView('home')" data-i18n="nav_home">Поиск туров</button>
            <button onclick="openChat()" data-i18n="nav_chat">Чат-бот 🤖</button>
        </div>
    </header>
    <div class="content">
        <div id="homeView" class="list-view">
            <div class="search-section">
                <div class="search-group"><label data-i18n="search_dest">Куда едем?</label><input type="text" id="searchDestination" placeholder="Страна или отель" data-i18n-placeholder="search_placeholder"></div>
                <div class="search-group"><label data-i18n="date_from">Заезд</label><input type="date" id="dateFrom"></div>
                <div class="search-group"><label data-i18n="date_to">Выезд</label><input type="date" id="dateTo"></div>
                <div class="search-group"><label data-i18n="travelers">Туристов</label><input type="number" id="travelers" value="2" min="1"></div>
                <div class="search-group"><button class="btn" style="padding:12px 30px;" onclick="searchTours()" data-i18n="search_btn">Найти тур</button></div>
                <div id="avatarContainer" style="display:none;" onclick="goToProfile()" class="avatar-search-wrapper"><div id="avatarPlaceholder" class="avatar"></div></div>
            </div>
            <div class="category-tabs" id="categoryTabs">
                <button class="category-btn active" data-cat="all" data-i18n="cat_all">🌍 Все туры</button>
                <button class="category-btn" data-cat="family" data-i18n="cat_family">👨‍👩‍👧‍👦 Семейные</button>
                <button class="category-btn" data-cat="excursion" data-i18n="cat_excursion">🏛 Экскурсионные</button>
                <button class="category-btn" data-cat="sport" data-i18n="cat_sport">⚡ Спортивные</button>
            </div>
            <div class="filter-row">
                <div class="filter-item"><label data-i18n="price_up_to">Цена до:</label><input type="range" id="priceFilter" min="0" max="600000" step="5000" value="600000" oninput="updatePriceLabel()"><span id="priceValue">600 000 ₽</span></div>
                <div class="filter-item"><label data-i18n="rating_from">Рейтинг от:</label><select id="ratingFilter"><option value="0" data-i18n="any">Любой</option><option value="4">4+</option><option value="4.5">4.5+</option><option value="4.8">4.8+</option></select></div>
                <div class="filter-item"><label data-i18n="meal">Питание:</label><select id="mealFilter"><option value="" data-i18n="any_meal">Любое</option><option value="all-inclusive">All Inclusive</option><option value="breakfast">Завтраки</option><option value="half">Полупансион</option></select></div>
            </div>
            <div id="toursContainer" class="tours-grid"></div>
        </div>
        <div id="profileView" class="detail-view" style="display:none;">
            <h2 style="margin-bottom:20px;" data-i18n="profile_title">👤 Личный кабинет</h2>
            <div class="profile-tabs" style="display:flex; gap:12px; margin-bottom:24px; border-bottom:2px solid #e2edf7; padding-bottom:8px;">
                <button class="tab-btn active" onclick="switchProfileTab('profileInfo')" data-i18n="profile_tab">Профиль</button>
                <button class="tab-btn" onclick="switchProfileTab('bookings')" data-i18n="bookings_tab">История бронирований</button>
                <button class="tab-btn" onclick="switchProfileTab('settings')" data-i18n="settings_tab">Настройки</button>
            </div>
            <div id="profileInfoTab" class="tab-content active"><div class="profile-section"><div id="profileAvatarPreview" class="avatar-preview"></div><p><strong data-i18n="name_label">Имя:</strong> <span id="profileName"></span></p><p><strong data-i18n="email_label">Email:</strong> <span id="profileEmail"></span></p></div></div>
            <div id="bookingsTab" class="tab-content"><div class="profile-section"><div id="bookingHistory"></div><button class="btn" style="margin-top:20px;" onclick="clearBookings()" data-i18n="clear_history">Очистить историю</button></div></div>
            <div id="settingsTab" class="tab-content"><div class="profile-section"><div class="settings-item"><label data-i18n="theme_label">Тема:</label><select id="themeSelect" onchange="changeTheme(this.value)"><option value="light">Светлая</option><option value="dark">Тёмная</option></select></div><div class="settings-item"><label data-i18n="lang_label">Язык:</label><select id="languageSelect" onchange="changeLanguage(this.value)"><option value="ru">Русский</option><option value="en">English</option></select></div><div class="settings-item avatar-upload"><label data-i18n="avatar_label">Аватар:</label><input type="file" id="avatarUpload" accept="image/*"><button class="btn" style="padding:8px 20px;" onclick="uploadAvatar()" data-i18n="upload_btn">Загрузить</button></div><div class="settings-item"><button class="logout-btn" onclick="logout()" data-i18n="logout_btn">Выйти из аккаунта</button></div></div></div>
        </div>
    </div>
</div>

<div id="destinationsModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeDestinationsModal()">&times;</span><h2 id="destModalTitle" data-i18n="dest_modal_title">Выберите город / курорт</h2><div id="destinationsList" class="destinations-list"></div></div></div>
<div id="extrasModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeExtrasModal()">&times;</span><h2 data-i18n="extras_title">✨ Дополнительные услуги</h2><div id="extrasList" class="extras-group"></div><button id="confirmBookingBtn" class="btn" style="width:100%;" onclick="confirmBookingWithExtras()" data-i18n="confirm_btn">Подтвердить бронь</button></div></div>
<div id="authModal" class="modal"></div>
<div id="chatWidget" class="chat-widget"></div>

            { id: 44, destination: isRu?"Исландия":"Iceland", hotelName: "Icelandair Hotel", price: 206000, rating: 4.8, meal: "half", category: "sport", description: isRu?"Трекинг к вулканам.":"Volcano trekking.", amenities: isRu?["Ледниковые туры"]:["Glacier tours"] },
            { id: 45, destination: isRu?"Кения":"Kenya", hotelName: "Loisaba Tented Camp", price: 256000, rating: 4.9, meal: "all-inclusive", category: "sport", description: isRu?"Сафари на бегу, марафоны.":"Running safari, marathons.", amenities: isRu?["Сафари-туры"]:["Safari tours"] }
        ];
        const all = [...familyTours, ...excursionTours, ...sportTours];
        all.forEach(t => {
            t.image = countryImages[t.destination] || defaultImage;
        });
        return all;
    };

    let currentLang = localStorage.getItem('travelEaseLang') || 'ru';
    let toursData = generateToursData(currentLang);
    let currentCategory = "all";
    let currentTour = null;
    let selectedDestination = null;
    let currentUser = null;
    let users = JSON.parse(localStorage.getItem('travelEaseUsers')) || [];

    // Направления (15 для каждого тура) - динамическая генерация
    function getDestinationsForTour(tour) {
        const country = tour.destination;
        const variants = [country+" Центр", country+" Пляж", country+" Старый город", country+" Порт", country+" Озеро", country+" Горы", country+" Долина", country+" Заповедник", country+" Курортный", country+" Прибрежный", country+" Исторический", country+" Зелёный", country+" Восточный", country+" Западный", country+" Северный"];
        if(currentLang === 'en') return variants.map(v => v.replace("Центр","Center").replace("Пляж","Beach").replace("Старый город","Old Town").replace("Порт","Port").replace("Озеро","Lake").replace("Горы","Mountains").replace("Долина","Valley").replace("Заповедник","Reserve").replace("Курортный","Resort").replace("Прибрежный","Coastal").replace("Исторический","Historic").replace("Зелёный","Green").replace("Восточный","Eastern").replace("Западный","Western").replace("Северный","Northern"));
        return variants;
    }

    function applyLanguage() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (i18n[currentLang][key]) el.placeholder = i18n[currentLang][key];
        });
        document.getElementById('languageSelect').value = currentLang;
        toursData = generateToursData(currentLang);
        filterTours();
        const destModalTitle = document.getElementById('destModalTitle');
        if (destModalTitle) destModalTitle.innerText = i18n[currentLang].dest_modal_title;
        const chatWelcome = document.querySelector('#chatMessages .chat-message.bot .chat-bubble');
        if (chatWelcome) chatWelcome.innerText = i18n[currentLang].chat_welcome;
    }

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('travelEaseLang', lang);
        applyLanguage();
        showNotification(currentLang === 'ru' ? 'Язык изменён на русский' : 'Language changed to English');
    }

    function renderTours(tours) {
        const container = document.getElementById('toursContainer');
        if (!tours.length) { container.innerHTML = `<p style="text-align:center; padding:40px;">${currentLang === 'ru' ? 'Туры не найдены' : 'No tours found'}</p>`; return; }
        container.innerHTML = tours.map(t => {
            let badgeText = '';
            if (t.category === 'family') badgeText = i18n[currentLang].family_badge;
            else if (t.category === 'excursion') badgeText = i18n[currentLang].excursion_badge;
            else if (t.category === 'sport') badgeText = i18n[currentLang].sport_badge;
            return `<div class="tour-card" onclick='showDestinations(${JSON.stringify(t).replace(/'/g, "&#39;")})'>
                <img src="${t.image}" alt="${t.hotelName}" loading="lazy" onerror="this.src='${defaultImage}'">
                <div class="tour-info">
                    <h3>${t.hotelName}</h3>
                    <div class="destination">${t.destination}</div>
                    <div class="price">${t.price.toLocaleString()} ₽</div>
                    <div class="rating">★ ${t.rating}</div>
                    <div class="tour-category-badge">${badgeText}</div>
                </div>
            </div>`;
        }).join('');
    }

    function filterTours() {
        const query = document.getElementById('searchDestination').value.toLowerCase();
        const maxPrice = parseInt(document.getElementById('priceFilter').value);
        const minRating = parseFloat(document.getElementById('ratingFilter').value) || 0;
        const meal = document.getElementById('mealFilter').value;
        let filtered = toursData.filter(t => {
            const matchCat = currentCategory === "all" || t.category === currentCategory;
            const matchSearch = t.destination.toLowerCase().includes(query) || t.hotelName.toLowerCase().includes(query);
            return matchCat && matchSearch && t.price <= maxPrice && t.rating >= minRating && (meal === '' || t.meal === meal);
        });
        renderTours(filtered);
    }

    function setCategory(category) { currentCategory = category; document.querySelectorAll('.category-btn').forEach(btn => { if (btn.dataset.cat === category) btn.classList.add('active'); else btn.classList.remove('active'); }); filterTours(); }
    function searchTours() { filterTours(); }
    function updatePriceLabel() { const val = document.getElementById('priceFilter').value; document.getElementById('priceValue').innerText = Number(val).toLocaleString() + ' ₽'; filterTours(); }
    function showView(view) { document.getElementById('homeView').style.display = view === 'home' ? 'block' : 'none'; document.getElementById('profileView').style.display = view === 'profile' ? 'block' : 'none'; if (view === 'profile' && !currentUser) { alert(currentLang === 'ru' ? 'Войдите в личный кабинет' : 'Please login'); openAuthModal(); showView('home'); } if (view === 'home') filterTours(); }

    function showDestinations(tour) {
        currentTour = tour;
        const destinations = getDestinationsForTour(tour);
        document.getElementById("destModalTitle").innerHTML = `${currentLang === 'ru' ? '📍 Выберите направление для тура «' : '📍 Choose destination for tour «'}${tour.hotelName}» (${tour.destination})`;
        const container = document.getElementById("destinationsList");
        container.innerHTML = destinations.map(dest => `<div class="dest-card" onclick="selectDestination('${dest.replace(/'/g, "\\'")}')">✈️ ${dest}</div>`).join('');
        document.getElementById("destinationsModal").classList.add("active");
    }
    function selectDestination(dest) { selectedDestination = dest; closeDestinationsModal(); openExtrasModal(); }
    function openExtrasModal() {
        if (!currentUser) { alert(currentLang === 'ru' ? 'Войдите, чтобы забронировать' : 'Login to book'); openAuthModal(); return; }
        if (!currentTour || !selectedDestination) return;
        const extrasContainer = document.getElementById('extrasList');
        const possibleExtras = currentLang === 'ru' ? 
            ["🏛️ Экскурсия к древним руинам (50$)", "🍷 Дегустация местных вин (35$)", "🤿 Дайвинг с инструктором (70$)", "💆‍♀️ СПА-процедуры на двоих (120$)", "🚁 Полёт на вертолёте (200$)", "🚤 Прогулка на яхте (90$)", "📸 Фотосессия (80$)"] :
            ["🏛️ Ancient ruins excursion ($50)", "🍷 Local wine tasting ($35)", "🤿 Diving with instructor ($70)", "💆‍♀️ Couple spa treatments ($120)", "🚁 Helicopter flight ($200)", "🚤 Yacht cruise ($90)", "📸 Photoshoot ($80)"];
        extrasContainer.innerHTML = possibleExtras.map(service => `<label><input type="checkbox" value="${service}"> ${service}</label>`).join('');
        document.getElementById('extrasModal').classList.add('active');
    }
    function closeExtrasModal() { document.getElementById('extrasModal').classList.remove('active'); }
    function closeDestinationsModal() { document.getElementById('destinationsModal').classList.remove('active'); }
    function confirmBookingWithExtras() {
        const checkboxes = document.querySelectorAll('#extrasList input:checked');
        const selectedExtras = Array.from(checkboxes).map(cb => cb.value);
        closeExtrasModal();
        const booking = {
            id: Date.now(),
            tourId: currentTour.id,
            hotel: currentTour.hotelName,
            destinationCountry: currentTour.destination,
            selectedPlace: selectedDestination,
            date: new Date().toLocaleDateString(),
            price: currentTour.price,
            extras: selectedExtras,
            totalPrice: currentTour.price + selectedExtras.reduce((sum, ex) => sum + (parseInt(ex.match(/\d+/)?.[0]) || 0), 0)
        };
        if (!currentUser.bookings) currentUser.bookings = [];
        currentUser.bookings.push(booking);
        const index = users.findIndex(u => u.id === currentUser.id);
        if (index !== -1) users[index] = currentUser;
        saveUsers(); saveCurrentUser(); renderBookingHistory();
        let extrasText = selectedExtras.length ? `\n➕ ${currentLang === 'ru' ? 'Услуги' : 'Services'}: ${selectedExtras.join(', ')}` : '';
        showNotification(`${currentLang === 'ru' ? '✅ Забронирован' : '✅ Booked'} ${booking.hotel} (${booking.selectedPlace})! ${currentLang === 'ru' ? 'Сумма' : 'Total'}: ${booking.totalPrice} ₽${extrasText}`);
        setTimeout(() => { showNotification(currentLang === 'ru' ? '✈️ Напоминание: вылет через 24 часа!' : '✈️ Reminder: departure in 24 hours!'); }, 2000);
        selectedDestination = null;
    }

    // Пользовательские функции
    function saveUsers() { localStorage.setItem('travelEaseUsers', JSON.stringify(users)); }
    function saveCurrentUser() { if(currentUser) localStorage.setItem('travelEaseCurrentUser', JSON.stringify({ id: currentUser.id, name: currentUser.name, email: currentUser.email })); else localStorage.removeItem('travelEaseCurrentUser'); }
    function loadCurrentUser() { const saved = localStorage.getItem('travelEaseCurrentUser'); if(saved){ let data=JSON.parse(saved); let found=users.find(u=>u.id===data.id); if(found) currentUser=found; } updateUIForUser(); }
    function updateUIForUser() { const authBtn = document.getElementById('authButton'); if(currentUser){ authBtn.style.display = 'none'; document.getElementById('profileName').textContent = currentUser.name; document.getElementById('profileEmail').textContent = currentUser.email; } else { authBtn.style.display = 'inline-block'; document.getElementById('profileName').textContent = '—'; document.getElementById('profileEmail').textContent = '—'; } updateAvatarDisplay(); renderBookingHistory(); }
    function updateAvatarDisplay() { const container = document.getElementById('avatarContainer'), avatarPH = document.getElementById('avatarPlaceholder'), profilePrev = document.getElementById('profileAvatarPreview'); if(currentUser){ container.style.display = 'flex'; if(currentUser.avatar){ avatarPH.innerHTML = `<img src="${currentUser.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`; profilePrev.innerHTML = `<img src="${currentUser.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`; } else { let letter = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : '?'; avatarPH.innerText = letter; avatarPH.innerHTML = letter; avatarPH.style.background = 'linear-gradient(135deg, #0066CC, #4098ff)'; profilePrev.innerText = letter; profilePrev.innerHTML = letter; profilePrev.style.background = 'linear-gradient(135deg, #0066CC, #4098ff)'; } } else { container.style.display = 'none'; profilePrev.innerHTML = ''; } }
    function renderBookingHistory() { const container = document.getElementById('bookingHistory'); if(!currentUser || !currentUser.bookings?.length) { container.innerHTML = `<p>${currentLang === 'ru' ? 'У вас пока нет бронирований.' : 'No bookings yet.'}</p>`; return; } container.innerHTML = currentUser.bookings.map(b => `<div class="booking-item"><div><strong>${b.hotel}</strong> (${b.selectedPlace || b.destinationCountry})<br><small>${b.date} · ${b.price.toLocaleString()} ₽</small>${b.extras && b.extras.length ? `<div class="extras-list">🎯 ${currentLang === 'ru' ? 'Услуги' : 'Extras'}: ${b.extras.join(', ')}<br>💰 ${currentLang === 'ru' ? 'Итого' : 'Total'}: ${b.totalPrice} ₽</div>` : ''}</div><div><button class="btn" style="padding:6px 16px;" onclick="downloadVoucher('${b.id}')">📄 ${currentLang === 'ru' ? 'Ваучер' : 'Voucher'}</button></div></div>`).join(''); }
    function downloadVoucher(bookingId) { if(!currentUser) return; const booking = currentUser.bookings.find(b => b.id == bookingId); if(!booking) return; let extrasInfo = booking.extras?.length ? `\n${currentLang === 'ru' ? 'Дополнительные услуги' : 'Extra services'}: ${booking.extras.join(', ')}\n${currentLang === 'ru' ? 'Итоговая стоимость' : 'Total price'}: ${booking.totalPrice} ₽` : ''; const content = `${currentLang === 'ru' ? 'Ваучер на тур в отель' : 'Voucher for hotel'} ${booking.hotel}\n${currentLang === 'ru' ? 'Место' : 'Place'}: ${booking.selectedPlace}\n${currentLang === 'ru' ? 'Дата брони' : 'Booking date'}: ${booking.date}\n${currentLang === 'ru' ? 'Стоимость' : 'Price'}: ${booking.price} ₽${extrasInfo}\n${currentLang === 'ru' ? 'Спасибо за выбор TravelEase!' : 'Thank you for choosing TravelEase!'}`; const blob = new Blob([content], {type: 'text/plain'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `voucher_${booking.id}.txt`; a.click(); URL.revokeObjectURL(url); showNotification(currentLang === 'ru' ? 'Ваучер сохранён' : 'Voucher saved'); }
    function clearBookings() { if(currentUser) { currentUser.bookings = []; saveUsers(); saveCurrentUser(); renderBookingHistory(); showNotification(currentLang === 'ru' ? 'История очищена' : 'History cleared'); } }
    function showNotification(text) { const n = document.createElement('div'); n.className = 'notification'; n.innerText = text; document.body.appendChild(n); setTimeout(()=>n.remove(),4000); }
    function switchProfileTab(tabId) { document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); if(tabId === 'profileInfo') { document.querySelectorAll('.tab-btn')[0].classList.add('active'); document.getElementById('profileInfoTab').classList.add('active'); } else if(tabId === 'bookings') { document.querySelectorAll('.tab-btn')[1].classList.add('active'); document.getElementById('bookingsTab').classList.add('active'); renderBookingHistory(); } else if(tabId === 'settings') { document.querySelectorAll('.tab-btn')[2].classList.add('active'); document.getElementById('settingsTab').classList.add('active'); } }
    function goToProfile() { if(currentUser) showView('profile'); else openAuthModal(); }
    function uploadAvatar() { const file = document.getElementById('avatarUpload').files[0]; if(!file || !currentUser) return; const reader = new FileReader(); reader.onload = e => { currentUser.avatar = e.target.result; const idx = users.findIndex(u=>u.id===currentUser.id); if(idx!==-1) users[idx]=currentUser; saveUsers(); saveCurrentUser(); updateAvatarDisplay(); showNotification(currentLang === 'ru' ? 'Аватар обновлён' : 'Avatar updated'); }; reader.readAsDataURL(file); }
    function openAuthModal() { document.getElementById('authModal').classList.add('active'); showLoginForm(); }
    function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }
    function showLoginForm() { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; }
    function showRegisterForm() { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; }
    function register() { let name=document.getElementById('regName').value.trim(), email=document.getElementById('regEmail').value.trim(), password=document.getElementById('regPassword').value.trim(); if(!name||!email||!password){ alert(currentLang === 'ru' ? 'Заполните поля' : 'Fill all fields'); return; } if(users.find(u=>u.email===email)){ alert(currentLang === 'ru' ? 'Email уже существует' : 'Email already exists'); return; } const newUser = { id: Date.now().toString(), name, email, password, bookings: [], avatar: null }; users.push(newUser); saveUsers(); currentUser=newUser; saveCurrentUser(); updateUIForUser(); closeAuthModal(); showNotification(currentLang === 'ru' ? 'Регистрация успешна!' : 'Registration successful!'); }
    function login() { let email=document.getElementById('loginEmail').value.trim(), password=document.getElementById('loginPassword').value.trim(); let user=users.find(u=>u.email===email && u.password===password); if(!user){ alert(currentLang === 'ru' ? 'Неверный email или пароль' : 'Invalid email or password'); return; } currentUser=user; saveCurrentUser(); updateUIForUser(); closeAuthModal(); showNotification(currentLang === 'ru' ? 'Добро пожаловать!' : 'Welcome!'); }
    function logout() { currentUser=null; saveCurrentUser(); updateUIForUser(); showView('home'); showNotification(currentLang === 'ru' ? 'Вы вышли' : 'Logged out'); }
    function openChat() { document.getElementById('chatWidget').classList.add('open'); }
    function closeChat() { document.getElementById('chatWidget').classList.remove('open'); }
    function sendMessage() { const inp = document.getElementById('chatInput'); const msg = inp.value.trim(); if(!msg) return; addChatMessage(msg,'user'); inp.value=''; setTimeout(()=>botReply(msg),500); }
    function addChatMessage(text,sender) { const container = document.getElementById('chatMessages'); const div = document.createElement('div'); div.className = `chat-message ${sender}`; div.innerHTML = `<div class="chat-bubble">${text}</div>`; container.appendChild(div); container.scrollTop = container.scrollHeight; }
    function botReply(msg) { let reply = currentLang === 'ru' ? 'Здравствуйте! Выберите тур, затем направление из 15 вариантов и добавьте услуги.' : 'Hello! Choose a tour, then one of 15 destinations and add services.'; if(msg.toLowerCase().includes('скидка') || msg.toLowerCase().includes('discount')) reply = currentLang === 'ru' ? 'Сейчас действует промокод TRAVEL10 на скидку 10%!' : 'Promo code TRAVEL10 gives 10% discount!'; else if(msg.toLowerCase().includes('услуг') || msg.toLowerCase().includes('services')) reply = currentLang === 'ru' ? 'При бронировании доступны экскурсии, дайвинг, спа и вертолётные туры.' : 'Excursions, diving, spa and helicopter tours are available when booking.'; addChatMessage(reply, 'bot'); }
    function changeTheme(theme) { if(theme==='dark') document.body.classList.add('dark-theme'); else document.body.classList.remove('dark-theme'); localStorage.setItem('travelEaseTheme', theme); document.getElementById('themeSelect').value = theme; }
    function loadTheme() { changeTheme(localStorage.getItem('travelEaseTheme') || 'light'); }

    window.onload = () => {
        loadTheme();
        currentLang = localStorage.getItem('travelEaseLang') || 'ru';
        applyLanguage();
        loadCurrentUser();
        filterTours();
        document.getElementById('languageSelect').value = currentLang;
        document.querySelectorAll('.category-btn').forEach(btn => btn.addEventListener('click', () => setCategory(btn.dataset.cat)));
        document.getElementById('authModal').innerHTML = `<div class="modal-content"><span class="close-modal" onclick="closeAuthModal()">&times;</span><h2 data-i18n="login_title">Вход</h2><div id="loginForm"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="${currentLang === 'ru' ? 'Пароль' : 'Password'}"><button class="btn" style="width:100%;" onclick="login()" data-i18n="login_btn">Войти</button><div style="text-align:center; margin-top:15px; color:#0066CC; cursor:pointer;" onclick="showRegisterForm()" data-i18n="to_register">Нет аккаунта? Зарегистрируйтесь</div></div><div id="registerForm" style="display:none;"><input type="text" id="regName" placeholder="${currentLang === 'ru' ? 'Имя' : 'Name'}"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="${currentLang === 'ru' ? 'Пароль' : 'Password'}"><button class="btn" style="width:100%;" onclick="register()" data-i18n="register_btn">Зарегистрироваться</button><div style="text-align:center; margin-top:15px; color:#0066CC; cursor:pointer;" onclick="showLoginForm()" data-i18n="to_login">Уже есть аккаунт? Войти</div></div></div>`;
        document.getElementById('chatWidget').innerHTML = `<div class="chat-header"><span>🤖 TravelBot</span><button onclick="closeChat()" style="background:none; border:none; font-size:22px; cursor:pointer;">✕</button></div><div id="chatMessages" class="chat-messages"><div class="chat-message bot"><div class="chat-bubble">${i18n[currentLang].chat_welcome}</div></div></div><div class="chat-input-area"><input type="text" id="chatInput" placeholder="${currentLang === 'ru' ? 'Напишите сообщение...' : 'Type a message...'}" onkeypress="if(event.key==='Enter') sendMessage()"><button onclick="sendMessage()">➤</button></div>`;
    };
</script>
</body>
</html>
