<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TravelEase — элитные туры | 45 направлений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f5f7fc;
            padding: 16px;
            line-height: 1.5;
            color: #1a2c3e;
        }

        body.dark-theme {
            background: #0f1724;
            color: #eef2ff;
        }

        /* скролл */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        body.dark-theme ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        body.dark-theme ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        header {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 12px 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(0, 102, 204, 0.12);
        }

        body.dark-theme header {
            background: #1e2939;
            border-color: #2d3a4a;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066CC, #2b8cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            white-space: nowrap;
        }

        body.dark-theme .logo {
            background: linear-gradient(135deg, #70a9ff, #a0c4ff);
            -webkit-background-clip: text;
        }

        .user-area button, .nav button {
            background: transparent;
            border: 1.5px solid #0066CC;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            color: #0066CC;
            transition: 0.2s;
        }

        body.dark-theme .user-area button, body.dark-theme .nav button {
            border-color: #70a9ff;
            color: #70a9ff;
        }

        .nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav button {
            background: none;
            border: none;
            padding: 8px 16px;
            font-weight: 500;
        }

        .nav button.active {
            background: #0066CC;
            color: white;
            box-shadow: 0 6px 14px rgba(0, 102, 204, 0.25);
        }

        body.dark-theme .nav button.active {
            background: #70a9ff;
            color: #0f1724;
        }

        .content {
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #eef2f8;
        }

        body.dark-theme .content {
            background: #1a2533;
            border-color: #2a3747;
        }

        /* поисковая секция адаптив */
        .search-section {
            background: #f9fbfe;
            padding: 18px 20px;
            border-radius: 48px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            border: 1px solid #e2edf7;
        }

        body.dark-theme .search-section {
            background: #1f2c3a;
            border-color: #2e3f4e;
        }

        .search-group {
            flex: 1 1 150px;
            min-width: 120px;
        }

        .search-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5b7a9a;
            margin-bottom: 4px;
        }

        .search-group input, .search-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 60px;
            border: 1px solid #cbdde9;
            background: white;
            font-size: 14px;
            outline: none;
        }

        body.dark-theme .search-group input, body.dark-theme .search-group select {
            background: #253241;
            border-color: #405468;
            color: #eef2ff;
        }

        .avatar-search-wrapper {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066CC, #4098ff);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            border: 2px solid white;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .filter-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 16px 0 20px;
            padding: 12px 0;
            border-top: 1px solid #e2edf7;
            border-bottom: 1px solid #e2edf7;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 14px;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-btn {
            background: #eef2ff;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: #1e3a5f;
        }

        body.dark-theme .category-btn {
            background: #2d3a4a;
            color: #cbd5e6;
        }

        .category-btn.active {
            background: #0066CC;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        input[type="range"] {
            width: 160px;
            height: 5px;
            -webkit-appearance: none;
            background: #cbdde9;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #0066CC;
            border-radius: 50%;
            cursor: pointer;
        }

        /* tours grid адаптив */
        .tours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .tour-card {
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            cursor: pointer;
            border: 1px solid #eef2fa;
        }

        body.dark-theme .tour-card {
            background: #202d3c;
            border-color: #2e4051;
        }

        .tour-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 28px 38px -14px rgba(0, 0, 0, 0.2);
        }

        .tour-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: #d9e2ef;
        }

        .tour-info {
            padding: 16px 18px 22px;
        }

        .tour-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .destination {
            color: #5b7a9a;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .price {
            font-size: 24px;
            font-weight: 800;
            color: #0066CC;
        }

        body.dark-theme .price {
            color: #70a9ff;
        }

        .rating {
            color: #f5b042;
            margin-top: 8px;
            font-weight: 500;
        }

        .tour-category-badge {
            display: inline-block;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            color: #0066CC;
        }

        /* модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 24px;
            width: 92%;
            max-width: 560px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            animation: fadeUp 0.25s ease;
            max-height: 85vh;
            overflow-y: auto;
        }

        body.dark-theme .modal-content {
            background: #1e2a36;
            color: #fff;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .destinations-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .dest-card {
            background: #f0f4fa;
            padding: 12px 8px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .btn {
            background: #0066CC;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 102, 204, 0.3);
        }

        .btn:hover {
            background: #004c99;
            transform: translateY(-2px);
        }

        .extras-group {
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .extras-group label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            cursor: pointer;
        }

        .profile-section {
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px;
        }

        body.dark-theme .profile-section {
            background: #253240;
        }

        .booking-item {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #eef2f8;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
        }

        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 330px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 1000;
        }

        .chat-widget.open {
            display: flex;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #0066CC;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            animation: slideUp 0.3s;
            z-index: 2000;
            max-width: 90%;
            font-size: 14px;
        }

        /* адаптив под телефон */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .content {
                padding: 16px;
            }

            .search-section {
                flex-direction: column;
                align-items: stretch;
                border-radius: 28px;
            }

            .filter-row {
                flex-direction: column;
                gap: 12px;
            }

            .tours-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .chat-widget {
                width: 280px;
                right: 12px;
                bottom: 12px;
            }

            .category-tabs {
                justify-content: center;
            }

            .avatar {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
        }

        .profile-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2edf7;
            padding-bottom: 8px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
        }

        .tab-btn.active {
            background: #0066CC;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #0066CC;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="logo" onclick="location.reload()">✈ TravelEase</div>
        <div class="user-area" id="userArea">
            <button id="authButton" onclick="openAuthModal()" data-i18n="auth_btn">Вход / Регистрация</button>
        </div>
        <div class="nav">
            <button id="navHome" class="active" onclick="showView('home')" data-i18n="nav_home">Поиск туров</button>
            <button onclick="openChat()" data-i18n="nav_chat">Чат-бот 🤖</button>
        </div>
    </header>
    <div class="content">
        <div id="homeView" class="list-view">
            <div class="search-section">
                <div class="search-group"><label data-i18n="search_dest">Куда едем?</label><input type="text" id="searchDestination" placeholder="Страна или отель" data-i18n-placeholder="search_placeholder"></div>
                <div class="search-group"><label data-i18n="date_from">Заезд</label><input type="date" id="dateFrom"></div>
                <div class="search-group"><label data-i18n="date_to">Выезд</label><input type="date" id="dateTo"></div>
                <div class="search-group"><label data-i18n="travelers">Туристов</label><input type="number" id="travelers" value="2" min="1"></div>
                <div class="search-group"><button class="btn" style="padding:10px 24px;" onclick="searchTours()" data-i18n="search_btn">Найти тур</button></div>
                <div id="avatarContainer" style="display:none;" onclick="goToProfile()" class="avatar-search-wrapper"><div id="avatarPlaceholder" class="avatar"></div></div>
            </div>
            <div class="category-tabs" id="categoryTabs">
                <button class="category-btn active" data-cat="all" data-i18n="cat_all">🌍 Все туры</button>
                <button class="category-btn" data-cat="family" data-i18n="cat_family">👨‍👩‍👧‍👦 Семейные</button>
                <button class="category-btn" data-cat="excursion" data-i18n="cat_excursion">🏛 Экскурсионные</button>
                <button class="category-btn" data-cat="sport" data-i18n="cat_sport">⚡ Спортивные</button>
            </div>
            <div class="filter-row">
                <div class="filter-item"><label data-i18n="price_up_to">Цена до:</label><input type="range" id="priceFilter" min="0" max="600000" step="5000" value="600000" oninput="updatePriceLabel()"><span id="priceValue">600 000 ₽</span></div>
                <div class="filter-item"><label data-i18n="rating_from">Рейтинг от:</label><select id="ratingFilter"><option value="0" data-i18n="any">Любой</option><option value="4">4+</option><option value="4.5">4.5+</option><option value="4.8">4.8+</option></select></div>
                <div class="filter-item"><label data-i18n="meal">Питание:</label><select id="mealFilter"><option value="" data-i18n="any_meal">Любое</option><option value="all-inclusive">All Inclusive</option><option value="breakfast">Завтраки</option><option value="half">Полупансион</option></select></div>
            </div>
            <div id="toursContainer" class="tours-grid"></div>
        </div>
        <div id="profileView" class="detail-view" style="display:none;">
            <h2 style="margin-bottom:20px;" data-i18n="profile_title">👤 Личный кабинет</h2>
            <div class="profile-tabs">
                <button class="tab-btn active" onclick="switchProfileTab('profileInfo')" data-i18n="profile_tab">Профиль</button>
                <button class="tab-btn" onclick="switchProfileTab('bookings')" data-i18n="bookings_tab">История бронирований</button>
                <button class="tab-btn" onclick="switchProfileTab('settings')" data-i18n="settings_tab">Настройки</button>
            </div>
            <div id="profileInfoTab" class="tab-content active"><div class="profile-section"><div id="profileAvatarPreview" class="avatar-preview"></div><p><strong data-i18n="name_label">Имя:</strong> <span id="profileName"></span></p><p><strong data-i18n="email_label">Email:</strong> <span id="profileEmail"></span></p></div></div>
            <div id="bookingsTab" class="tab-content"><div class="profile-section"><div id="bookingHistory"></div><button class="btn" style="margin-top:20px;" onclick="clearBookings()" data-i18n="clear_history">Очистить историю</button></div></div>
            <div id="settingsTab" class="tab-content"><div class="profile-section"><div class="settings-item"><label data-i18n="theme_label">Тема:</label><select id="themeSelect" onchange="changeTheme(this.value)"><option value="light">Светлая</option><option value="dark">Тёмная</option></select></div><div class="settings-item"><label data-i18n="lang_label">Язык:</label><select id="languageSelect" onchange="changeLanguage(this.value)"><option value="ru">Русский</option><option value="en">English</option></select></div><div class="settings-item"><label data-i18n="avatar_label">Аватар:</label><input type="file" id="avatarUpload" accept="image/*"><button class="btn" style="padding:6px 18px;" onclick="uploadAvatar()" data-i18n="upload_btn">Загрузить</button></div><div class="settings-item"><button class="logout-btn" onclick="logout()" data-i18n="logout_btn">Выйти</button></div></div></div>
        </div>
    </div>
</div>

<div id="destinationsModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeDestinationsModal()">&times;</span><h2 id="destModalTitle" data-i18n="dest_modal_title">Выберите город / курорт</h2><div id="destinationsList" class="destinations-list"></div></div></div>
<div id="extrasModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeExtrasModal()">&times;</span><h2 data-i18n="extras_title">✨ Дополнительные услуги</h2><div id="extrasList" class="extras-group"></div><button id="confirmBookingBtn" class="btn" style="width:100%;" onclick="confirmBookingWithExtras()" data-i18n="confirm_btn">Подтвердить бронь</button></div></div>
<div id="authModal" class="modal"></div>
<div id="chatWidget" class="chat-widget"></div>

<script>
    // ------------------- ПЕРЕВОДЫ -------------------
    const i18n = {
        ru: { auth_btn:"Вход / Регистрация", nav_home:"Поиск туров", nav_chat:"Чат-бот 🤖", search_dest:"Куда едем?", search_placeholder:"Страна или отель", date_from:"Заезд", date_to:"Выезд", travelers:"Туристов", search_btn:"Найти тур", price_up_to:"Цена до:", rating_from:"Рейтинг от:", meal:"Питание:", any:"Любой", any_meal:"Любое", cat_all:"🌍 Все туры", cat_family:"👨‍👩‍👧‍👦 Семейные", cat_excursion:"🏛 Экскурсионные", cat_sport:"⚡ Спортивные", profile_title:"👤 Личный кабинет", profile_tab:"Профиль", bookings_tab:"История бронирований", settings_tab:"Настройки", name_label:"Имя:", email_label:"Email:", clear_history:"Очистить историю", theme_label:"Тема:", lang_label:"Язык:", avatar_label:"Аватар:", upload_btn:"Загрузить", logout_btn:"Выйти", login_title:"Вход", login_btn:"Войти", to_register:"Нет аккаунта? Зарегистрируйтесь", register_btn:"Зарегистрироваться", to_login:"Уже есть аккаунт? Войти", extras_title:"✨ Дополнительные услуги", confirm_btn:"Подтвердить бронь", dest_modal_title:"Выберите город / курорт", chat_welcome:"Здравствуйте! Нажмите на любой тур, увидите 15 направлений и услуги.", family_badge:"👪 Семейный", excursion_badge:"🏛 Экскурсионный", sport_badge:"⚡ Спортивный" },
        en: { auth_btn:"Login / Register", nav_home:"Search tours", nav_chat:"Chat bot 🤖", search_dest:"Where to go?", search_placeholder:"Country or hotel", date_from:"Check-in", date_to:"Check-out", travelers:"Travelers", search_btn:"Find tour", price_up_to:"Price up to:", rating_from:"Rating from:", meal:"Meal:", any:"Any", any_meal:"Any", cat_all:"🌍 All tours", cat_family:"👨‍👩‍👧‍👦 Family", cat_excursion:"🏛 Excursion", cat_sport:"⚡ Sport", profile_title:"👤 My Account", profile_tab:"Profile", bookings_tab:"Booking history", settings_tab:"Settings", name_label:"Name:", email_label:"Email:", clear_history:"Clear history", theme_label:"Theme:", lang_label:"Language:", avatar_label:"Avatar:", upload_btn:"Upload", logout_btn:"Logout", login_title:"Login", login_btn:"Login", to_register:"No account? Register", register_btn:"Register", to_login:"Already have account? Login", extras_title:"✨ Extra services", confirm_btn:"Confirm booking", dest_modal_title:"Choose city / resort", chat_welcome:"Hello! Click tour → choose destination → add extras.", family_badge:"👪 Family", excursion_badge:"🏛 Excursion", sport_badge:"⚡ Sport" }
    };

    let currentLang = localStorage.getItem('travelEaseLang') || 'ru';
    let toursData = generateToursData(currentLang);
    let currentCategory = "all";
    let currentTour = null, selectedDestination = null, currentUser = null;
    let users = JSON.parse(localStorage.getItem('travelEaseUsers')) || [];

    function getDestinationsForTour(tour) {
        let variants = [];
        for(let i=1;i<=15;i++) variants.push(`${tour.destination} ${currentLang==='ru'?`Район ${i}`:`Area ${i}`}`);
        return variants;
    }

    function applyLanguage() { document.querySelectorAll('[data-i18n]').forEach(el=>{if(i18n[currentLang][el.dataset.i18n])el.innerText=i18n[currentLang][el.dataset.i18n];}); document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{if(i18n[currentLang][el.dataset.i18nPlaceholder])el.placeholder=i18n[currentLang][el.dataset.i18nPlaceholder];}); document.getElementById('languageSelect').value=currentLang; toursData=generateToursData(currentLang); filterTours(); if(document.getElementById('destModalTitle')) document.getElementById('destModalTitle').innerText=i18n[currentLang].dest_modal_title; }
    function changeLanguage(lang) { currentLang=lang; localStorage.setItem('travelEaseLang',lang); applyLanguage(); showNotification(currentLang==='ru'?'Язык изменён':'Language changed'); }
    function renderTours(tours) { const container=document.getElementById('toursContainer'); if(!tours.length){ container.innerHTML=`<p style="text-align:center;padding:40px;">${currentLang==='ru'?'Туры не найдены':'No tours'}</p>`; return; } container.innerHTML=tours.map(t=>`<div class="tour-card" onclick='showDestinations(${JSON.stringify(t).replace(/'/g, "&#39;")})'><img src="${t.image}" onerror="this.src='${defaultImage}'" alt="${t.hotelName}"><div class="tour-info"><h3>${t.hotelName}</h3><div class="destination">${t.destination}</div><div class="price">${t.price.toLocaleString()} ₽</div><div class="rating">★ ${t.rating}</div><div class="tour-category-badge">${t.category==='family'?i18n[currentLang].family_badge:t.category==='excursion'?i18n[currentLang].excursion_badge:i18n[currentLang].sport_badge}</div></div></div>`).join(''); }
    function filterTours() { const q=document.getElementById('searchDestination').value.toLowerCase(); const maxP=parseInt(document.getElementById('priceFilter').value); const minR=parseFloat(document.getElementById('ratingFilter').value)||0; const meal=document.getElementById('mealFilter').value; let filtered=toursData.filter(t=>(currentCategory==="all"||t.category===currentCategory)&&(t.destination.toLowerCase().includes(q)||t.hotelName.toLowerCase().includes(q))&&t.price<=maxP&&t.rating>=minR&&(meal===''||t.meal===meal)); renderTours(filtered); }
    function setCategory(cat){ currentCategory=cat; document.querySelectorAll('.category-btn').forEach(btn=>{if(btn.dataset.cat===cat)btn.classList.add('active');else btn.classList.remove('active');}); filterTours();}
    function searchTours(){ filterTours();}
    function updatePriceLabel(){ const val=document.getElementById('priceFilter').value; document.getElementById('priceValue').innerText=Number(val).toLocaleString()+' ₽'; filterTours();}
    function showView(view){ document.getElementById('homeView').style.display=view==='home'?'block':'none'; document.getElementById('profileView').style.display=view==='profile'?'block':'none'; if(view==='profile'&&!currentUser){ alert(currentLang==='ru'?'Войдите':'Please login'); openAuthModal(); showView('home');} if(view==='home') filterTours();}
    function showDestinations(tour){ currentTour=tour; const dests=getDestinationsForTour(tour); document.getElementById("destModalTitle").innerHTML=`${currentLang==='ru'?'📍 Направления для':'📍 Destinations for'} ${tour.hotelName}`; document.getElementById("destinationsList").innerHTML=dests.map(d=>`<div class="dest-card" onclick="selectDestination('${d.replace(/'/g,"\\'")}')">✈️ ${d}</div>`).join(''); document.getElementById("destinationsModal").classList.add("active"); }
    function selectDestination(dest){ selectedDestination=dest; closeDestinationsModal(); openExtrasModal();}
    function openExtrasModal(){ if(!currentUser){ alert(currentLang==='ru'?'Войдите':'Login to book'); openAuthModal(); return;} const extrasList=currentLang==='ru'?["🏛️ Экскурсия (50$)","🍷 Дегустация вин (35$)","🤿 Дайвинг (70$)","💆‍♀️ СПА (120$)","🚁 Вертолёт (200$)"]:["🏛️ Excursion ($50)","🍷 Wine tasting ($35)","🤿 Diving ($70)","💆‍♀️ Spa ($120)","🚁 Helicopter ($200)"]; document.getElementById('extrasList').innerHTML=extrasList.map(s=>`<label><input type="checkbox" value="${s}"> ${s}</label>`).join(''); document.getElementById('extrasModal').classList.add('active');}
    function closeExtrasModal(){ document.getElementById('extrasModal').classList.remove('active');}
    function closeDestinationsModal(){ document.getElementById('destinationsModal').classList.remove('active');}
    function confirmBookingWithExtras(){ const checkboxes=document.querySelectorAll('#extrasList input:checked'); const selected=Array.from(checkboxes).map(cb=>cb.value); closeExtrasModal(); const totalExtra=selected.reduce((sum,ex)=>{ let m=ex.match(/\d+/); return sum+(m?parseInt(m[0]):0);},0); const booking={id:Date.now(),tourId:currentTour.id,hotel:currentTour.hotelName,destinationCountry:currentTour.destination,selectedPlace:selectedDestination,date:new Date().toLocaleDateString(),price:currentTour.price,extras:selected,totalPrice:currentTour.price+totalExtra}; if(!currentUser.bookings)currentUser.bookings=[]; currentUser.bookings.push(booking); const idx=users.findIndex(u=>u.id===currentUser.id); if(idx!==-1)users[idx]=currentUser; saveUsers(); saveCurrentUser(); renderBookingHistory(); showNotification(`${currentLang==='ru'?'✅ Забронирован':'✅ Booked'} ${booking.hotel} (${booking.selectedPlace})! ${currentLang==='ru'?'Итого':'Total'}: ${booking.totalPrice} ₽`); selectedDestination=null; }
    function saveUsers(){ localStorage.setItem('travelEaseUsers',JSON.stringify(users));}
    function saveCurrentUser(){ if(currentUser)localStorage.setItem('travelEaseCurrentUser',JSON.stringify({id:currentUser.id,name:currentUser.name,email:currentUser.email})); else localStorage.removeItem('travelEaseCurrentUser');}
    function loadCurrentUser(){ const saved=localStorage.getItem('travelEaseCurrentUser'); if(saved){ let data=JSON.parse(saved); let found=users.find(u=>u.id===data.id); if(found)currentUser=found;} updateUIForUser();}
    function updateUIForUser(){ const authBtn=document.getElementById('authButton'); if(currentUser){ authBtn.style.display='none'; document.getElementById('profileName').textContent=currentUser.name; document.getElementById('profileEmail').textContent=currentUser.email;} else { authBtn.style.display='inline-block'; document.getElementById('profileName').textContent='—'; document.getElementById('profileEmail').textContent='—';} updateAvatarDisplay(); renderBookingHistory();}
    function updateAvatarDisplay(){ const container=document.getElementById('avatarContainer'), avatarPH=document.getElementById('avatarPlaceholder'), profilePrev=document.getElementById('profileAvatarPreview'); if(currentUser){ container.style.display='flex'; if(currentUser.avatar){ avatarPH.innerHTML=`<img src="${currentUser.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`; profilePrev.innerHTML=`<img src="${currentUser.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;} else { const letter=currentUser.name?currentUser.name.charAt(0).toUpperCase():'?'; avatarPH.innerHTML=letter; avatarPH.style.background='linear-gradient(135deg, #0066CC, #4098ff)'; profilePrev.innerHTML=letter; profilePrev.style.background='linear-gradient(135deg, #0066CC, #4098ff)';}} else { container.style.display='none'; profilePrev.innerHTML='';}}
    function renderBookingHistory(){ const container=document.getElementById('bookingHistory'); if(!currentUser||!currentUser.bookings?.length){ container.innerHTML=`<p>${currentLang==='ru'?'Нет бронирований.':'No bookings.'}</p>`; return;} container.innerHTML=currentUser.bookings.map(b=>`<div class="booking-item"><div><strong>${b.hotel}</strong> (${b.selectedPlace})<br><small>${b.date} · ${b.price} ₽</small>${b.extras?.length?`<div class="extras-list">➕ ${b.extras.join(', ')}<br>💰 Итого: ${b.totalPrice} ₽</div>`:''}</div><div><button class="btn" style="padding:5px 14px;" onclick="downloadVoucher('${b.id}')">📄 ${currentLang==='ru'?'Ваучер':'Voucher'}</button></div></div>`).join('');}
    function downloadVoucher(id){ if(!currentUser)return; const b=currentUser.bookings.find(bk=>bk.id==id); if(!b)return; const content=`${currentLang==='ru'?'ВАУЧЕР НА ТУР':'VOUCHER'}\n${b.hotel}\n${currentLang==='ru'?'Направление':'Place'}: ${b.selectedPlace}\n${currentLang==='ru'?'Дата':'Date'}: ${b.date}\n${currentLang==='ru'?'Стоимость':'Price'}: ${b.price} ₽\n${b.extras?.length?`${currentLang==='ru'?'Услуги':'Extras'}: ${b.extras.join(', ')}\n${currentLang==='ru'?'Итого':'Total'}: ${b.totalPrice} ₽\n`:''}TravelEase`; const blob=new Blob([content],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`voucher_${b.id}.txt`; a.click(); URL.revokeObjectURL(a.href); showNotification(currentLang==='ru'?'Ваучер сохранён':'Voucher saved');}
    function clearBookings(){ if(currentUser) { currentUser.bookings=[]; saveUsers(); saveCurrentUser(); renderBookingHistory(); showNotification(currentLang==='ru'?'История очищена':'History cleared');}}
    function showNotification(text){ const n=document.createElement('div'); n.className='notification'; n.innerText=text; document.body.appendChild(n); setTimeout(()=>n.remove(),3500);}
    function switchProfileTab(tabId){ document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); if(tabId==='profileInfo'){ document.querySelectorAll('.tab-btn')[0].classList.add('active'); document.getElementById('profileInfoTab').classList.add('active');} else if(tabId==='bookings'){ document.querySelectorAll('.tab-btn')[1].classList.add('active'); document.getElementById('bookingsTab').classList.add('active'); renderBookingHistory();} else if(tabId==='settings'){ document.querySelectorAll('.tab-btn')[2].classList.add('active'); document.getElementById('settingsTab').classList.add('active');}}
    function goToProfile(){ if(currentUser) showView('profile'); else openAuthModal();}
    function uploadAvatar(){ const file=document.getElementById('avatarUpload').files[0]; if(!file||!currentUser)return; const reader=new FileReader(); reader.onload=e=>{ currentUser.avatar=e.target.result; const idx=users.findIndex(u=>u.id===currentUser.id); if(idx!==-1)users[idx]=currentUser; saveUsers(); saveCurrentUser(); updateAvatarDisplay(); showNotification(currentLang==='ru'?'Аватар обновлён':'Avatar updated');}; reader.readAsDataURL(file);}
    function openAuthModal(){ document.getElementById('authModal').classList.add('active'); showLoginForm();}
    function closeAuthModal(){ document.getElementById('authModal').classList.remove('active');}
    function showLoginForm(){ document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none';}
    function showRegisterForm(){ document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block';}
    function register(){ let name=document.getElementById('regName').value.trim(), email=document.getElementById('regEmail').value.trim(), password=document.getElementById('regPassword').value.trim(); if(!name||!email||!password){ alert(currentLang==='ru'?'Заполните поля':'Fill fields'); return;} if(users.find(u=>u.email===email)){ alert(currentLang==='ru'?'Email уже существует':'Email exists'); return;} const newUser={id:Date.now().toString(),name,email,password,bookings:[],avatar:null}; users.push(newUser); saveUsers(); currentUser=newUser; saveCurrentUser(); updateUIForUser(); closeAuthModal(); showNotification(currentLang==='ru'?'Регистрация успешна!':'Registration success!');}
    function login(){ let email=document.getElementById('loginEmail').value.trim(), password=document.getElementById('loginPassword').value.trim(); let user=users.find(u=>u.email===email && u.password===password); if(!user){ alert(currentLang==='ru'?'Неверный email/пароль':'Invalid credentials'); return;} currentUser=user; saveCurrentUser(); updateUIForUser(); closeAuthModal(); showNotification(currentLang==='ru'?'Добро пожаловать!':'Welcome!');}
    function logout(){ currentUser=null; saveCurrentUser(); updateUIForUser(); showView('home'); showNotification(currentLang==='ru'?'Вы вышли':'Logged out');}
    function openChat(){ document.getElementById('chatWidget').classList.add('open');}
    function closeChat(){ document.getElementById('chatWidget').classList.remove('open');}
    function sendMessage(){ const inp=document.getElementById('chatInput'); const msg=inp.value.trim(); if(!msg)return; addChatMessage(msg,'user'); inp.value=''; setTimeout(()=>{ let reply=i18n[currentLang].chat_welcome; if(msg.toLowerCase().includes('скидка')||msg.toLowerCase().includes('discount')) reply=currentLang==='ru'?'Промокод TRAVEL10 даёт 10%!':'Promo TRAVEL10 10% off!'; else if(msg.toLowerCase().includes('услуг')||msg.toLowerCase().includes('services')) reply=currentLang==='ru'?'Можно добавить экскурсии, спа, дайвинг.':'Extras: excursions, spa, diving.'; addChatMessage(reply,'bot');},400);}
    function addChatMessage(text,sender){ const container=document.getElementById('chatMessages'); const div=document.createElement('div'); div.className=`chat-message ${sender}`; div.innerHTML=`<div class="chat-bubble">${text}</div>`; container.appendChild(div); container.scrollTop=container.scrollHeight;}
    function changeTheme(theme){ if(theme==='dark') document.body.classList.add('dark-theme'); else document.body.classList.remove('dark-theme'); localStorage.setItem('travelEaseTheme',theme); document.getElementById('themeSelect').value=theme;}
    function loadTheme(){ changeTheme(localStorage.getItem('travelEaseTheme')||'light');}

    window.onload=()=>{
        loadTheme(); currentLang=localStorage.getItem('travelEaseLang')||'ru'; applyLanguage(); loadCurrentUser(); filterTours(); document.getElementById('languageSelect').value=currentLang; document.querySelectorAll('.category-btn').forEach(btn=>btn.addEventListener('click',()=>setCategory(btn.dataset.cat)));
        document.getElementById('authModal').innerHTML=`<div class="modal-content"><span class="close-modal" onclick="closeAuthModal()">&times;</span><h2 data-i18n="login_title">Вход</h2><div id="loginForm"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="${currentLang==='ru'?'Пароль':'Password'}"><button class="btn" style="width:100%;" onclick="login()" data-i18n="login_btn">Войти</button><div style="text-align:center; margin-top:15px; color:#0066CC; cursor:pointer;" onclick="showRegisterForm()" data-i18n="to_register">Нет аккаунта? Зарегистрируйтесь</div></div><div id="registerForm" style="display:none;"><input type="text" id="regName" placeholder="${currentLang==='ru'?'Имя':'Name'}"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="${currentLang==='ru'?'Пароль':'Password'}"><button class="btn" style="width:100%;" onclick="register()" data-i18n="register_btn">Зарегистрироваться</button><div style="text-align:center; margin-top:15px; color:#0066CC; cursor:pointer;" onclick="showLoginForm()" data-i18n="to_login">Уже есть аккаунт? Войти</div></div></div>`;
        document.getElementById('chatWidget').innerHTML=`<div class="chat-header"><span>🤖 TravelBot</span><button onclick="closeChat()" style="background:none; border:none; font-size:22px; cursor:pointer;">✕</button></div><div id="chatMessages" class="chat-messages"><div class="chat-message bot"><div class="chat-bubble">${i18n[currentLang].chat_welcome}</div></div></div><div class="chat-input-area"><input type="text" id="chatInput" placeholder="${currentLang==='ru'?'Напишите...':'Type...'}" onkeypress="if(event.key==='Enter') sendMessage()"><button onclick="sendMessage()">➤</button></div>`;
    };
</script>
</body>
</html>
